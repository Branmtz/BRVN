<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRVN — Pasarela de Pruebas</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .simulator-box {
      max-width: 480px;
      margin: 64px auto;
      border: 2px dashed #000;
      border-radius: 8px;
      padding: 40px;
      background-color: #fafafa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="simulator-box">
      <div style="text-align: center; margin-bottom: 24px;">
        <i class="fa-solid fa-flask" style="font-size: 32px; color: #ff9500; margin-bottom: 8px;"></i>
        <h2 style="font-size: 22px; font-weight: 600;">Simulador de Pago BRVN</h2>
        <span class="badge pending" style="margin-top: 6px;">Modo de Pruebas</span>
      </div>

      <div class="tracking-info-box" style="margin-bottom: 24px; font-size: 14px;">
        <p><strong>Folio del Pedido:</strong> <span id="folio-display">PAPS-1001</span></p>
        <p><strong>Monto a Pagar:</strong> <span id="total-display">$0 MXN</span></p>
        <p style="margin-top: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.4;">
          Estás viendo esta pantalla porque el servidor no tiene configuradas credenciales reales de Mercado Pago en el archivo <code>.env</code>.
        </p>
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px;">
        <button id="approve-btn" class="buy-button" style="background-color: #34c759;">
          <i class="fa-solid fa-check"></i> Simular Pago Aprobado
        </button>
        <button id="fail-btn" class="secondary-btn" style="color: #ff3b30; border-color: #ff3b30; text-align: center; padding: 12px;">
          <i class="fa-solid fa-xmark"></i> Simular Pago Rechazado
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const folio = params.get('folio') || 'PAPS-0000';
      const total = params.get('total') || '0';
      
      document.getElementById('folio-display').textContent = folio;
      document.getElementById('total-display').textContent = `$${parseInt(total).toLocaleString()} MXN`;
      
      document.getElementById('approve-btn').addEventListener('click', async () => {
        const btn = document.getElementById('approve-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando aprobación...';
        
        try {
          const res = await fetch('/api/checkout/simulate-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ folio })
          });
          
          if (res.ok) {
            // Redirect to success
            window.location.href = `/resultado-compra.html?status=success&folio=${folio}`;
          } else {
            alert('Error al simular la aprobación.');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Simular Pago Aprobado';
          }
        } catch (e) {
          console.error(e);
          alert('Error de conexión.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-check"></i> Simular Pago Aprobado';
        }
      });
      
      document.getElementById('fail-btn').addEventListener('click', () => {
        window.location.href = `/resultado-compra.html?status=failure&folio=${folio}`;
      });
    });
  </script>
</body>
</html>
