<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JHH66S9WHT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-JHH66S9WHT');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - B R V N</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-secondary);
      padding: 24px;
    }
    .auth-card {
      background: var(--bg-primary);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }
    .auth-title {
      font-weight: 600;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
      line-height: 1.6;
      text-align: center;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text-primary);
      background-color: var(--bg-primary);
      transition: var(--transition-smooth);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    .form-error {
      color: #ff3b30;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background-color: var(--accent-color);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .btn-submit:hover {
      opacity: 0.9;
    }
    .btn-submit:disabled {
      background-color: var(--text-secondary);
      cursor: not-allowed;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--text-primary);
      font-weight: 500;
      text-decoration: underline;
    }
    .alert-success {
      background-color: #e8f5e9;
      color: #2e7d32;
      padding: 16px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
      border: 1px solid #c8e6c9;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-container">
          <a href="/" class="brand-logo">
            <span class="logo-title">B R V N</span>
            <span class="logo-sub">CALZADO</span>
          </a>
        </div>
        <h2 class="auth-title">¿Olvidaste tu contraseña?</h2>
        <p class="auth-subtitle">Ingresa tu correo electrónico registrado y te enviaremos las instrucciones para restablecer tu contraseña.</p>
      </div>
      
      <div class="alert-success" id="success-alert"></div>
      
      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
          <div class="form-error" id="error-email">Por favor ingresa un correo válido</div>
        </div>
        
        <button type="submit" class="btn-submit" id="btn-submit-forgot">Enviar enlace</button>
      </form>
      
      <div class="auth-footer">
        <a href="/index.html?tab=menu">Volver al inicio de sesión</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgot-form');
    const emailInput = document.getElementById('email');
    const successAlert = document.getElementById('success-alert');
    const btnSubmit = document.getElementById('btn-submit-forgot');
    
    emailInput.addEventListener('input', () => {
      document.getElementById('error-email').style.display = 'none';
    });
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        const err = document.getElementById('error-email');
        err.textContent = 'Por favor ingresa un correo electrónico válido';
        err.style.display = 'block';
        return;
      }
      
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Enviando...';
      
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        
        successAlert.textContent = data.message || 'Si el correo está registrado, recibirás un enlace de recuperación en unos momentos.';
        successAlert.style.display = 'block';
        form.style.display = 'none';
      } catch (err) {
        console.error(err);
        alert('Error al conectar con el servidor.');
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Enviar enlace';
      }
    });
  </script>
</body>
</html>
