<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificar Correo - B R V N</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-secondary);
      padding: 24px;
    }
    .auth-card {
      background: var(--bg-primary);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
      text-align: center;
    }
    .logo-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }
    .auth-title {
      font-weight: 600;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .code-inputs {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 24px;
    }
    .code-input {
      width: 50px;
      height: 60px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      color: var(--text-primary);
      background-color: var(--bg-primary);
      transition: var(--transition-smooth);
    }
    .code-input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
    }
    .timer-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-weight: 500;
    }
    .timer-text span {
      color: #ff3b30;
      font-weight: bold;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background-color: var(--accent-color);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 6px;
      margin-bottom: 16px;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .btn-submit:hover {
      opacity: 0.9;
    }
    .btn-submit:disabled {
      background-color: var(--text-secondary);
      cursor: not-allowed;
    }
    .btn-resend {
      font-size: 14px;
      color: var(--text-primary);
      text-decoration: underline;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .btn-resend:disabled {
      color: var(--text-secondary);
      cursor: not-allowed;
      text-decoration: none;
    }
    .form-error {
      color: #ff3b30;
      font-size: 13px;
      margin-bottom: 20px;
      font-weight: 500;
      display: none;
    }
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .success-icon {
      font-size: 64px;
      color: #34c759;
      margin-bottom: 24px;
      animation: scaleUp 0.4s ease-out;
    }
    @keyframes scaleUp {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card" id="main-card-content">
      <div id="verification-form-wrapper">
        <div class="logo-container">
          <a href="/" class="brand-logo">
            <span class="logo-title">B R V N</span>
            <span class="logo-sub">CALZADO</span>
          </a>
        </div>
        <h2 class="auth-title">Verifica tu correo</h2>
        <p class="auth-subtitle">Hemos enviado un código de verificación de 6 dígitos a <br><strong id="display-email">tu correo</strong>.</p>
        
        <div class="form-error" id="error-message"></div>
        
        <div class="code-inputs">
          <input type="text" maxlength="1" class="code-input" pattern="\d*" inputmode="numeric" autofocus>
          <input type="text" maxlength="1" class="code-input" pattern="\d*" inputmode="numeric">
          <input type="text" maxlength="1" class="code-input" pattern="\d*" inputmode="numeric">
          <input type="text" maxlength="1" class="code-input" pattern="\d*" inputmode="numeric">
          <input type="text" maxlength="1" class="code-input" pattern="\d*" inputmode="numeric">
          <input type="text" maxlength="1" class="code-input" pattern="\d*" inputmode="numeric">
        </div>
        
        <div class="timer-text">El código expira en <span id="timer-display">05:00</span></div>
        
        <button id="btn-verify" class="btn-submit">Verificar Código</button>
        
        <div>
          <button id="btn-resend" class="btn-resend" disabled>Reenviar código</button>
        </div>
      </div>
      
      <div id="success-screen" class="success-screen">
        <i class="fa-solid fa-circle-check success-icon"></i>
        <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 12px;">¡Cuenta verificada!</h2>
        <p style="color: var(--text-secondary); font-size: 16px;">Te damos la bienvenida a B R V N Calzado.</p>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    if (!email) {
      window.location.href = '/register.html';
    } else {
      document.getElementById('display-email').textContent = email;
    }
    
    const inputs = document.querySelectorAll('.code-input');
    const verifyBtn = document.getElementById('btn-verify');
    const resendBtn = document.getElementById('btn-resend');
    const timerDisplay = document.getElementById('timer-display');
    const errorMessage = document.getElementById('error-message');
    
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value;
        if (val && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });
      
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });
    
    let countdownInterval;
    let timeRemaining = 5 * 60;
    
    function startTimer() {
      clearInterval(countdownInterval);
      timeRemaining = 5 * 60;
      resendBtn.disabled = true;
      
      countdownInterval = setInterval(() => {
        timeRemaining--;
        const mins = Math.floor(timeRemaining / 60);
        const secs = timeRemaining % 60;
        
        const minsStr = mins.toString().padStart(2, '0');
        const secsStr = secs.toString().padStart(2, '0');
        timerDisplay.textContent = `${minsStr}:${secsStr}`;
        
        if (timeRemaining <= 0) {
          clearInterval(countdownInterval);
          resendBtn.disabled = false;
          timerDisplay.innerHTML = '<span>Código expirado</span>';
        }
      }, 1000);
    }
    
    startTimer();
    
    verifyBtn.addEventListener('click', async () => {
      errorMessage.style.display = 'none';
      let code = '';
      inputs.forEach(input => code += input.value.trim());
      
      if (code.length !== 6) {
        errorMessage.textContent = 'Por favor ingresa los 6 dígitos del código';
        errorMessage.style.display = 'block';
        return;
      }
      
      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verificando...';
      
      try {
        const res = await fetch('/api/auth/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('paps_customer_token', data.token);
          
          document.getElementById('verification-form-wrapper').style.display = 'none';
          document.getElementById('success-screen').style.display = 'flex';
          
          setTimeout(() => {
            window.location.href = '/index.html?tab=menu';
          }, 2500);
        } else {
          errorMessage.textContent = data.error || 'Código incorrecto';
          errorMessage.style.display = 'block';
          verifyBtn.disabled = false;
          verifyBtn.textContent = 'Verificar Código';
          inputs.forEach(input => input.value = '');
          inputs[0].focus();
        }
      } catch (err) {
        console.error(err);
        errorMessage.textContent = 'Error de conexión con el servidor.';
        errorMessage.style.display = 'block';
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verificar Código';
      }
    });
    
    resendBtn.addEventListener('click', async () => {
      errorMessage.style.display = 'none';
      resendBtn.disabled = true;
      
      try {
        const res = await fetch('/api/auth/resend-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        if (res.ok) {
          alert('Se ha enviado un nuevo código a tu correo.');
          inputs.forEach(input => input.value = '');
          inputs[0].focus();
          startTimer();
        } else {
          alert(data.error || 'No se pudo reenviar el código.');
          resendBtn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        alert('Error al conectar con el servidor.');
        resendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
